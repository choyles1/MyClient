<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary.active {
            background: #4c51bf;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .client-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .client-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .client-card.inactive {
            opacity: 0.6;
            border: 2px dashed #cbd5e0;
        }

        .client-card.warning {
            border: 3px solid #f56565;
        }

        .warning-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f56565;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .client-card h3 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .client-address {
            color: #4a5568;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .client-days {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .day-badge {
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .needs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
        }

        .need-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .client-notes {
            background: #f7fafc;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
            color: #4a5568;
        }

        .warning-note {
            background: #fff5f5;
            border-left: 4px solid #f56565;
            padding: 10px;
            margin: 10px 0;
            font-weight: bold;
            color: #c53030;
            text-transform: uppercase;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .card-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card-btn-call {
            background: #48bb78;
            color: white;
        }

        .card-btn-text {
            background: #4299e1;
            color: white;
        }

        .card-btn-route {
            background: #ed8936;
            color: white;
        }

        .card-btn-edit {
            background: #667eea;
            color: white;
        }

        .card-btn:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #2d3748;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #a0aec0;
            line-height: 1;
        }

        .close-btn:hover {
            color: #2d3748;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .phone-group {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .phone-entry {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .phone-entry input {
            flex: 1;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .form-actions button {
            flex: 1;
        }

        .route-selection {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .route-selection h3 {
            color: #2d3748;
            margin-bottom: 15px;
        }

        .route-selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .route-checkbox-label {
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .route-checkbox-label:hover {
            background: #edf2f7;
        }

        .route-checkbox-label input:checked + span {
            font-weight: 600;
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .client-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .route-selection-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Client Manager</h1>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, street, city, or zip...">
            </div>

            <div class="filter-buttons">
                <button class="btn btn-primary active" onclick="filterClients('all')">All Clients</button>
                <button class="btn btn-primary" onclick="filterClients('SUN')">SUN</button>
                <button class="btn btn-primary" onclick="filterClients('MON')">MON</button>
                <button class="btn btn-primary" onclick="filterClients('TUE')">TUE</button>
                <button class="btn btn-primary" onclick="filterClients('WED')">WED</button>
                <button class="btn btn-primary" onclick="filterClients('THU')">THU</button>
                <button class="btn btn-primary" onclick="filterClients('FRI')">FRI</button>
                <button class="btn btn-primary" onclick="filterClients('SAT')">SAT</button>
            </div>

            <div class="action-buttons">
                <button class="btn btn-success" onclick="openClientModal()">+ Add Client</button>
                <button class="btn btn-secondary" onclick="toggleRouteSelection()">📍 Plan Route</button>
                <button class="btn btn-secondary" onclick="syncData()">🔄 Sync Data</button>
            </div>
        </div>

        <div id="routeSelection" class="route-selection" style="display: none;">
            <h3>Select Clients for Route</h3>
            <div id="routeSelectionGrid" class="route-selection-grid"></div>
            <button class="btn btn-success" onclick="openRoute()">Open in Google Maps</button>
            <button class="btn btn-secondary" onclick="toggleRouteSelection()">Cancel</button>
        </div>

        <div id="clientGrid" class="client-grid"></div>
    </div>

    <!-- Client Modal -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Client</h2>
                <button class="close-btn" onclick="closeClientModal()">&times;</button>
            </div>
            
            <form id="clientForm" onsubmit="saveClient(event)">
                <input type="hidden" id="clientId">
                
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="clientName" required>
                </div>

                <div class="form-group">
                    <label>Street *</label>
                    <input type="text" id="clientStreet" required>
                </div>

                <div class="form-group">
                    <label>City *</label>
                    <input type="text" id="clientCity" required>
                </div>

                <div class="form-group">
                    <label>ZIP *</label>
                    <input type="text" id="clientZip" required>
                </div>

                <div class="form-group">
                    <label>Phone Numbers</label>
                    <div class="phone-group" id="phoneGroup"></div>
                    <button type="button" class="btn btn-secondary btn-small" onclick="addPhoneField()">+ Add Phone</button>
                </div>

                <div class="form-group">
                    <label>Days of Week to Visit</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="SUN"> Sunday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="MON"> Monday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="TUE"> Tuesday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="WED"> Wednesday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="THU"> Thursday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="FRI"> Friday
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="days" value="SAT"> Saturday
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Potential Needs</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="Trach"> Trach
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="Peg"> Peg
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="TPN"> TPN
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="PICC"> PICC
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="Midline"> Midline
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="Wound"> Wound
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="needs" value="Wound Vac"> Wound Vac
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="clientNotes"></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="warningCheck"> ⚠️ WARNING
                    </label>
                </div>

                <div class="form-group" id="warningNoteGroup" style="display: none;">
                    <label>Warning Note</label>
                    <textarea id="warningNote"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Save Client</button>
                    <button type="button" class="btn btn-secondary" onclick="closeClientModal()">Cancel</button>
                </div>

                <div class="form-actions" id="editActions" style="display: none;">
                    <button type="button" class="btn btn-danger" onclick="toggleClientStatus()">Deactivate</button>
                    <button type="button" class="btn btn-danger" onclick="deleteClient()">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>JSONBin Settings</h2>
                <button class="close-btn" onclick="closeSettingsModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>JSONBin API Key</label>
                <input type="text" id="jsonbinKey" placeholder="Enter your JSONBin API key">
            </div>

            <div class="form-group">
                <label>JSONBin Bin ID</label>
                <input type="text" id="jsonbinBinId" placeholder="Enter your Bin ID">
            </div>

            <div class="form-actions">
                <button class="btn btn-success" onclick="saveSettings()">Save Settings</button>
                <button class="btn btn-secondary" onclick="closeSettingsModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        var clients = [];
        var currentFilter = 'all';
        var routeSelectionMode = false;
        var selectedForRoute = [];
        var settings = {
            jsonbinKey: '',
            jsonbinBinId: ''
        };

        function init() {
            loadSettings();
            loadClients();
            addPhoneField();
            
            document.getElementById('searchInput').addEventListener('input', function(e) {
                renderClients();
            });

            document.getElementById('warningCheck').addEventListener('change', function(e) {
                document.getElementById('warningNoteGroup').style.display = e.target.checked ? 'block' : 'none';
            });

            document.getElementById('clientName').addEventListener('input', capitalizeInput);
            document.getElementById('clientStreet').addEventListener('input', capitalizeInput);
            document.getElementById('clientCity').addEventListener('input', capitalizeInput);
            document.getElementById('clientNotes').addEventListener('input', capitalizeInput);
        }

        function capitalizeInput(e) {
            var start = e.target.selectionStart;
            var end = e.target.selectionEnd;
            var value = e.target.value;
            
            var words = value.split(' ');
            var capitalized = words.map(function(word) {
                if (word.length === 0) return word;
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
            
            e.target.value = capitalized;
            e.target.setSelectionRange(start, end);
        }

        function formatPhoneNumber(input) {
            var numbers = input.value.replace(/\D/g, '');
            var formatted = '';
            
            if (numbers.length > 0) {
                formatted = '(' + numbers.substring(0, 3);
            }
            if (numbers.length >= 4) {
                formatted += ')-' + numbers.substring(3, 6);
            }
            if (numbers.length >= 7) {
                formatted += '-' + numbers.substring(6, 10);
            }
            
            input.value = formatted;
        }

        function addPhoneField() {
            var phoneGroup = document.getElementById('phoneGroup');
            var phoneEntry = document.createElement('div');
            phoneEntry.className = 'phone-entry';
            
            var input = document.createElement('input');
            input.type = 'tel';
            input.placeholder = '(xxx)-xxx-xxxx';
            input.className = 'phone-input';
            input.addEventListener('input', function() {
                formatPhoneNumber(this);
            });
            
            var removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'btn btn-danger btn-small';
            removeBtn.textContent = 'Remove';
            removeBtn.onclick = function() {
                phoneGroup.removeChild(phoneEntry);
            };
            
            phoneEntry.appendChild(input);
            phoneEntry.appendChild(removeBtn);
            phoneGroup.appendChild(phoneEntry);
        }

        function openClientModal(client) {
            var modal = document.getElementById('clientModal');
            var form = document.getElementById('clientForm');
            form.reset();
            
            var phoneGroup = document.getElementById('phoneGroup');
            phoneGroup.innerHTML = '';
            
            if (client) {
                document.getElementById('modalTitle').textContent = 'Edit Client';
                document.getElementById('clientId').value = client.id;
                document.getElementById('clientName').value = client.name;
                document.getElementById('clientStreet').value = client.street;
                document.getElementById('clientCity').value = client.city;
                document.getElementById('clientZip').value = client.zip;
                document.getElementById('clientNotes').value = client.notes || '';
                
                if (client.phones && client.phones.length > 0) {
                    client.phones.forEach(function(phone) {
                        addPhoneField();
                        var inputs = document.querySelectorAll('.phone-input');
                        inputs[inputs.length - 1].value = phone;
                    });
                } else {
                    addPhoneField();
                }
                
                var dayCheckboxes = document.querySelectorAll('input[name="days"]');
                dayCheckboxes.forEach(function(cb) {
                    cb.checked = client.days && client.days.indexOf(cb.value) !== -1;
                });
                
                var needCheckboxes = document.querySelectorAll('input[name="needs"]');
                needCheckboxes.forEach(function(cb) {
                    cb.checked = client.needs && client.needs.indexOf(cb.value) !== -1;
                });
                
                document.getElementById('warningCheck').checked = client.warning || false;
                document.getElementById('warningNote').value = client.warningNote || '';
                document.getElementById('warningNoteGroup').style.display = client.warning ? 'block' : 'none';
                
                document.getElementById('editActions').style.display = 'flex';
            } else {
                document.getElementById('modalTitle').textContent = 'Add Client';
                document.getElementById('clientId').value = '';
                addPhoneField();
                document.getElementById('editActions').style.display = 'none';
            }
            
            modal.classList.add('active');
        }

        function closeClientModal() {
            document.getElementById('clientModal').classList.remove('active');
        }

        function saveClient(e) {
            e.preventDefault();
            
            var id = document.getElementById('clientId').value;
            var phoneInputs = document.querySelectorAll('.phone-input');
            var phones = [];
            phoneInputs.forEach(function(input) {
                if (input.value.trim()) {
                    phones.push(input.value.trim());
                }
            });
            
            var dayCheckboxes = document.querySelectorAll('input[name="days"]:checked');
            var days = [];
            dayCheckboxes.forEach(function(cb) {
                days.push(cb.value);
            });
            
            var needCheckboxes = document.querySelectorAll('input[name="needs"]:checked');
            var needs = [];
            needCheckboxes.forEach(function(cb) {
                needs.push(cb.value);
            });
            
            var warningNote = document.getElementById('warningNote').value.toUpperCase();
            
            var client = {
                id: id || Date.now().toString(),
                name: document.getElementById('clientName').value,
                street: document.getElementById('clientStreet').value,
                city: document.getElementById('clientCity').value,
                zip: document.getElementById('clientZip').value,
                phones: phones,
                days: days,
                needs: needs,
                notes: document.getElementById('clientNotes').value,
                warning: document.getElementById('warningCheck').checked,
                warningNote: warningNote,
                active: true
            };
            
            if (id) {
                var index = clients.findIndex(function(c) { return c.id === id; });
                if (index !== -1) {
                    client.active = clients[index].active;
                    clients[index] = client;
                }
            } else {
                clients.push(client);
            }
            
            saveClients();
            closeClientModal();
            renderClients();
        }

        function toggleClientStatus() {
            var id = document.getElementById('clientId').value;
            var client = clients.find(function(c) { return c.id === id; });
            if (client) {
                client.active = !client.active;
                saveClients();
                closeClientModal();
                renderClients();
            }
        }

        function deleteClient() {
            if (!confirm('Are you sure you want to delete this client?')) {
                return;
            }
            
            var id = document.getElementById('clientId').value;
            clients = clients.filter(function(c) { return c.id !== id; });
            saveClients();
            closeClientModal();
            renderClients();
        }

        function filterClients(filter) {
            currentFilter = filter;
            
            var buttons = document.querySelectorAll('.filter-buttons .btn');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderClients();
        }

        function renderClients() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var filtered = clients.filter(function(client) {
                var matchesFilter = currentFilter === 'all' || 
                    (client.days && client.days.indexOf(currentFilter) !== -1);
                
                var matchesSearch = !searchTerm || 
                    client.name.toLowerCase().indexOf(searchTerm) !== -1 ||
                    client.street.toLowerCase().indexOf(searchTerm) !== -1 ||
                    client.city.toLowerCase().indexOf(searchTerm) !== -1 ||
                    client.zip.indexOf(searchTerm) !== -1;
                
                return matchesFilter && matchesSearch;
            });
            
            var grid = document.getElementById('clientGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No clients found</h3><p>Add a new client or adjust your filters</p></div>';
                return;
            }
            
            grid.innerHTML = filtered.map(function(client) {
                var cardClass = 'client-card';
                if (!client.active) cardClass += ' inactive';
                if (client.warning) cardClass += ' warning';
                
                var warningBadge = client.warning ? '<span class="warning-badge">⚠️ WARNING</span>' : '';
                
                var daysBadges = (client.days || []).map(function(day) {
                    return '<span class="day-badge">' + day + '</span>';
                }).join('');
                
                var needsBadges = (client.needs || []).map(function(need) {
                    return '<span class="need-badge">' + need + '</span>';
                }).join('');
                
                var notesHtml = client.notes ? '<div class="client-notes">' + client.notes + '</div>' : '';
                var warningNoteHtml = client.warning && client.warningNote ? 
                    '<div class="warning-note">' + client.warningNote + '</div>' : '';
                
                var phoneButtons = (client.phones || []).map(function(phone) {
                    return '<button class="card-btn card-btn-call" onclick="callPhone(\'' + phone + '\')">📞 Call</button>' +
                           '<button class="card-btn card-btn-text" onclick="textPhone(\'' + phone + '\')">💬 Text</button>';
                }).join('');
                
                return '<div class="' + cardClass + '">' +
                    warningBadge +
                    '<h3>' + client.name + '</h3>' +
                    '<div class="client-address">' +
                        client.street + '<br>' +
                        client.city + ', ' + client.zip +
                    '</div>' +
                    (daysBadges ? '<div class="client-days">' + daysBadges + '</div>' : '') +
                    (needsBadges ? '<div class="needs-container">' + needsBadges + '</div>' : '') +
                    notesHtml +
                    warningNoteHtml +
                    '<div class="card-actions">' +
                        phoneButtons +
                        '<button class="card-btn card-btn-route" onclick="routeToClient(\'' + client.id + '\')">📍 Route</button>' +
                        '<button class="card-btn card-btn-edit" onclick="editClient(\'' + client.id + '\')">✏️ Edit</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function editClient(id) {
            var client = clients.find(function(c) { return c.id === id; });
            if (client) {
                openClientModal(client);
            }
        }

        function callPhone(phone) {
            window.location.href = 'tel:' + phone.replace(/\D/g, '');
        }

        function textPhone(phone) {
            window.location.href = 'sms:' + phone.replace(/\D/g, '');
        }

        function routeToClient(id) {
            var client = clients.find(function(c) { return c.id === id; });
            if (client) {
                var address = encodeURIComponent(client.street + ', ' + client.city + ', ' + client.zip);
                window.open('https://www.google.com/maps/dir/?api=1&destination=' + address, '_blank');
            }
        }

        function toggleRouteSelection() {
            routeSelectionMode = !routeSelectionMode;
            var routeDiv = document.getElementById('routeSelection');
            
            if (routeSelectionMode) {
                routeDiv.style.display = 'block';
                selectedForRoute = [];
                renderRouteSelection();
            } else {
                routeDiv.style.display = 'none';
            }
        }

        function renderRouteSelection() {
            var grid = document.getElementById('routeSelectionGrid');
            var activeClients = clients.filter(function(c) { return c.active; });
            
            grid.innerHTML = activeClients.map(function(client) {
                var checked = selectedForRoute.indexOf(client.id) !== -1 ? 'checked' : '';
                return '<label class="route-checkbox-label">' +
                    '<input type="checkbox" ' + checked + ' onchange="toggleRouteClient(\'' + client.id + '\')">' +
                    '<span>' + client.name + ' - ' + client.street + '</span>' +
                '</label>';
            }).join('');
        }

        function toggleRouteClient(id) {
            var index = selectedForRoute.indexOf(id);
            if (index === -1) {
                selectedForRoute.push(id);
            } else {
                selectedForRoute.splice(index, 1);
            }
        }

        function openRoute() {
            if (selectedForRoute.length === 0) {
                alert('Please select at least one client for the route');
                return;
            }
            
            var waypoints = selectedForRoute.map(function(id) {
                var client = clients.find(function(c) { return c.id === id; });
                return encodeURIComponent(client.street + ', ' + client.city + ', ' + client.zip);
            });
            
            var url = 'https://www.google.com/maps/dir/?api=1&destination=' + waypoints[waypoints.length - 1];
            
            if (waypoints.length > 1) {
                url += '&waypoints=' + waypoints.slice(0, -1).join('|');
            }
            
            window.open(url, '_blank');
        }

        function loadSettings() {
            var saved = localStorage.getItem('clientManagerSettings');
            if (saved) {
                settings = JSON.parse(saved);
                document.getElementById('jsonbinKey').value = settings.jsonbinKey || '';
                document.getElementById('jsonbinBinId').value = settings.jsonbinBinId || '';
            }
        }

        function saveSettings() {
            settings.jsonbinKey = document.getElementById('jsonbinKey').value;
            settings.jsonbinBinId = document.getElementById('jsonbinBinId').value;
            localStorage.setItem('clientManagerSettings', JSON.stringify(settings));
            closeSettingsModal();
            
            if (settings.jsonbinKey && settings.jsonbinBinId) {
                syncToCloud();
            }
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function loadClients() {
            var saved = localStorage.getItem('clients');
            if (saved) {
                clients = JSON.parse(saved);
                renderClients();
            }
            
            if (settings.jsonbinKey && settings.jsonbinBinId) {
                syncFromCloud();
            }
        }

        function saveClients() {
            localStorage.setItem('clients', JSON.stringify(clients));
        }

        function syncData() {
            if (!settings.jsonbinKey || !settings.jsonbinBinId) {
                openSettingsModal();
                return;
            }
            
            syncToCloud();
        }

        function syncToCloud() {
            fetch('https://api.jsonbin.io/v3/b/' + settings.jsonbinBinId, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': settings.jsonbinKey
                },
                body: JSON.stringify({ clients: clients })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                alert('Data synced to cloud successfully!');
            })
            .catch(function(error) {
                alert('Error syncing to cloud: ' + error.message);
            });
        }

        function syncFromCloud() {
            fetch('https://api.jsonbin.io/v3/b/' + settings.jsonbinBinId + '/latest', {
                headers: {
                    'X-Master-Key': settings.jsonbinKey
                }
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.record && data.record.clients) {
                    clients = data.record.clients;
                    saveClients();
                    renderClients();
                }
            })
            .catch(function(error) {
                console.log('Could not load from cloud:', error);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
